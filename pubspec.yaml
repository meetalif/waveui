name: waveui
description: An enterprise-class package of Flutter components for mobile applications.
version: 0.0.10+4
homepage: https://github.com/meetalif/waveui

environment:
  sdk: ">=2.17.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  xml: ^6.1.0
  lpinyin: ^2.0.3
  intl: ^0.18.1
  photo_view: ^0.14.0
  bindings_compatible: ^1.0.1
  fluentui_system_icons: ^1.1.200
  get: ^4.6.6
  tapped: ^2.0.0
  flutter_animate: ^4.1.1+1
  loading_animation_widget:

dev_dependencies:
  flutter_lints: ^2.0.0

flutter:
  assets:
    - assets/images/
    - assets/icons/
    - assets/icons/radio/
    - assets/images/no_data.png
    - assets/images/two_line_bubble.png
    - assets/json/
    - assets/json/china.json

  fonts:
    - family: Bebas
      fonts:
        - asset: assets/fonts/Bebas-Regular.ttf
